name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# CI Pipeline — maps to the track system's validation levels:
#
#   Level 1: Static Analysis  → lint job
#   Level 2: Tests            → test job (+ coverage)
#   Level 3: Build            → build job
#   Level 4: E2E              → e2e job (optional)
#   Level 5: E2E Authenticated→ e2e-authenticated job (optional, secrets-gated)
#
# Add context/guides/ci-integration.md for detailed setup guidance if needed.
#
# SETUP: Uncomment and configure the steps for your language/runtime below.
#        Each job includes examples for Node.js, Python, Go, and Rust.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Level 1: Static Analysis ───────────────────────────────────────────────
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: Add your language/runtime setup and lint/typecheck commands.
      #
      # ── Node.js + pnpm ──
      #   - uses: pnpm/action-setup@v4
      #   - uses: actions/setup-node@v4
      #     with:
      #       node-version: 22
      #       cache: pnpm
      #   - run: pnpm install --frozen-lockfile
      #   - run: pnpm lint
      #   - run: pnpm typecheck
      #
      # ── Python ──
      #   - uses: actions/setup-python@v5
      #     with:
      #       python-version: "3.12"
      #   - run: pip install ruff mypy
      #   - run: ruff check .
      #   - run: mypy src/
      #
      # ── Go ──
      #   - uses: actions/setup-go@v5
      #     with:
      #       go-version: "1.22"
      #   - run: golangci-lint run ./...
      #   - run: go vet ./...
      #
      # ── Rust ──
      #   - uses: dtolnay/rust-toolchain@stable
      #     with:
      #       components: clippy, rustfmt
      #   - run: cargo fmt --check
      #   - run: cargo clippy -- -D warnings

  # ── Level 2: Tests ─────────────────────────────────────────────────────────
  #
  # IMPORTANT: If your tests hit a real database (integration tests, services
  # wired to an ORM), you MUST start a database container here.
  #
  # Common mistake: Tests pass locally (where your dev DB is running) but fail
  # in CI because no database is available. This happens silently when you
  # migrate from in-memory mocks to real DB queries.
  #
  # Rule: Test jobs need ONLY the database — never start your API server or
  # other application containers here. Those belong in E2E jobs.
  #
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: Add your runtime setup and test commands.
      #
      # ── Node.js ──
      #   - uses: pnpm/action-setup@v4
      #   - uses: actions/setup-node@v4
      #     with:
      #       node-version: 22
      #       cache: pnpm
      #   - run: pnpm install --frozen-lockfile
      #   - run: pnpm test
      #
      # ── Python ──
      #   - uses: actions/setup-python@v5
      #     with:
      #       python-version: "3.12"
      #   - run: pip install -r requirements.txt
      #   - run: pytest
      #
      # ── Go ──
      #   - uses: actions/setup-go@v5
      #     with:
      #       go-version: "1.22"
      #   - run: go test ./...
      #
      # ── Rust ──
      #   - uses: dtolnay/rust-toolchain@stable
      #   - run: cargo test

      # ── Database for tests (uncomment if your tests need a real database) ──
      #
      # Option A: Docker Compose (recommended if you have a docker-compose.yml)
      #
      #   - name: Start test database
      #     run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up db --detach --wait
      #     timeout-minutes: 2
      #
      # CRITICAL: Target only the database service by name (e.g., "up db").
      # Do NOT use a profile that also starts your API container — the API will
      # fail its health check (missing env vars, no build in CI context) and
      # block the entire job.
      #
      # Option B: GitHub Actions service container (PostgreSQL example)
      #
      #   services:
      #     postgres:
      #       image: postgres:16-alpine
      #       env:
      #         POSTGRES_USER: myapp
      #         POSTGRES_PASSWORD: myapp
      #         POSTGRES_DB: myapp_test
      #       ports:
      #         - 5432:5432
      #       options: >-
      #         --health-cmd "pg_isready -U myapp"
      #         --health-interval 5s
      #         --health-timeout 3s
      #         --health-retries 5
      #
      # Pass DATABASE_URL as an env var to your test command:
      #
      #   - run: your-test-command
      #     env:
      #       DATABASE_URL: postgres://myapp:myapp@localhost:5432/myapp_test
      #
      # ── Database cleanup (uncomment if using Docker Compose) ───────────────
      #
      #   - name: Cleanup test database
      #     if: always()
      #     run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  # ── Level 2b: Coverage (optional) ──────────────────────────────────────────
  #
  # Runs after test job passes. Needs the same database setup as the test job.
  # Uncomment this job if you want coverage reports.
  #
  # coverage:
  #   name: Coverage
  #   runs-on: ubuntu-latest
  #   needs: [test]
  #   steps:
  #     - uses: actions/checkout@v4
  #     # TODO: Same runtime + database setup as test job
  #     # - run: your-coverage-command
  #     # - uses: codecov/codecov-action@v4
  #     #   if: always()
  #     #   with:
  #     #     files: ./coverage/coverage-final.json
  #     #     fail_ci_if_error: false

  # ── Level 3: Build ─────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      # TODO: Add your build steps.
      #
      # ── Node.js ──
      #   - uses: pnpm/action-setup@v4
      #   - uses: actions/setup-node@v4
      #     with:
      #       node-version: 22
      #       cache: pnpm
      #   - run: pnpm install --frozen-lockfile
      #   - run: pnpm build
      #
      # ── Python ──
      #   - uses: actions/setup-python@v5
      #     with:
      #       python-version: "3.12"
      #   - run: pip install build
      #   - run: python -m build
      #
      # ── Go ──
      #   - uses: actions/setup-go@v5
      #     with:
      #       go-version: "1.22"
      #   - run: go build ./...
      #
      # ── Rust ──
      #   - uses: dtolnay/rust-toolchain@stable
      #   - run: cargo build --release

  # ── Level 4: E2E Tests (optional) ──────────────────────────────────────────
  #
  # E2E tests need the FULL STACK running: database + API + (optionally) web.
  # This is the only job where you should start application containers.
  #
  # Uncomment and configure this job when you add E2E tests.
  #
  # e2e:
  #   name: E2E Tests
  #   runs-on: ubuntu-latest
  #   needs: [build]
  #   steps:
  #     - uses: actions/checkout@v4
  #     # TODO: Runtime setup + start full stack + run E2E tests
  #     #
  #     # Start full stack via Docker Compose CI profile
  #     # - name: Start CI services (database + API)
  #     #   run: docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile ci up --detach --wait
  #     #   timeout-minutes: 3
  #     #
  #     # IMPORTANT: If your API container fails its health check, check:
  #     #   1. Dockerfile dev target builds workspace packages (dist/ must exist)
  #     #   2. All required env vars are set in docker-compose.ci.yml
  #     #   3. The health check endpoint works without auth middleware
  #     # Tip: Check container logs with `docker compose -f docker-compose.ci.yml logs`
  #     #
  #     # Run migrations + seed, then tests
  #     # - run: your-migrate-command && your-seed-command
  #     # - run: your-e2e-command
  #     #
  #     # Upload test artifacts (always, even on failure)
  #     # - uses: actions/upload-artifact@v4
  #     #   if: always()
  #     #   with:
  #     #     name: e2e-report
  #     #     path: path/to/e2e-report/
  #     #     retention-days: 30
  #     #
  #     # Cleanup
  #     # - name: Cleanup CI services
  #     #   if: always()
  #     #   run: docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile ci down -v

  # ── Level 5: E2E Authenticated (optional, secrets-gated) ───────────────────
  #
  # Runs authenticated E2E tests ONLY when auth secrets are configured.
  #
  # CRITICAL: GitHub Actions does NOT allow the `secrets` context in job-level
  # `if` conditions. Use a separate job to check secret availability.
  #
  # check-secrets:
  #   name: Check Secrets Availability
  #   runs-on: ubuntu-latest
  #   outputs:
  #     has-auth-keys: ${{ steps.check.outputs.has-auth-keys }}
  #   steps:
  #     - name: Check if auth secrets are configured
  #       id: check
  #       run: |
  #         if [ -n "${{ secrets.AUTH_SECRET_KEY }}" ]; then
  #           echo "has-auth-keys=true" >> "$GITHUB_OUTPUT"
  #         else
  #           echo "has-auth-keys=false" >> "$GITHUB_OUTPUT"
  #         fi
