  # e2e-authenticated:
  #   name: E2E Tests (Authenticated)
  #   runs-on: ubuntu-latest
  #   needs: [build, check-secrets]
  #   if: needs.check-secrets.outputs.has-auth-keys == 'true'
  #   continue-on-error: true
  #   steps:
  #     - uses: actions/checkout@v4
  #     # TODO: Same setup as e2e job, but pass auth secrets as env vars
